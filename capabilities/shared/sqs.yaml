naftiko: "1.0.0-alpha1"

info:
  label: "Amazon SQS"
  description: "Amazon Simple Queue Service API for queue management, message operations, batch processing, dead-letter queues, and access control."
  tags:
    - Amazon
    - AWS
    - Messaging
    - Queue
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: amazon-sqs
      baseUri: https://sqs.us-east-1.amazonaws.com
      description: "Amazon SQS message queuing service"
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: queues
          path: /
          description: "Queue management operations"
          operations:
            - name: create-queue
              method: POST
              description: "Create a new standard or FIFO queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Action: "CreateQueue"
                  QueueName: "{{tools.queue_name}}"
            - name: delete-queue
              method: POST
              description: "Delete an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-queues
              method: POST
              description: "List all SQS queues"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-queue-url
              method: POST
              description: "Get the URL of an existing queue by name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-queue-attributes
              method: POST
              description: "Get attributes for an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: set-queue-attributes
              method: POST
              description: "Set attributes for an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: purge-queue
              method: POST
              description: "Delete all messages in a queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: messages
          path: /
          description: "Message operations"
          operations:
            - name: send-message
              method: POST
              description: "Send a message to an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: receive-message
              method: POST
              description: "Receive messages from an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-message
              method: POST
              description: "Delete a message from a queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: send-message-batch
              method: POST
              description: "Send up to 10 messages to a queue in a single batch"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-message-batch
              method: POST
              description: "Delete up to 10 messages from a queue in a single batch"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: change-message-visibility
              method: POST
              description: "Change the visibility timeout of a message"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tags
          path: /
          description: "Queue tagging operations"
          operations:
            - name: list-queue-tags
              method: POST
              description: "List tags for an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: tag-queue
              method: POST
              description: "Add tags to an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: untag-queue
              method: POST
              description: "Remove tags from an SQS queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: dead-letter
          path: /
          description: "Dead-letter queue operations"
          operations:
            - name: list-dead-letter-source-queues
              method: POST
              description: "List queues that have a dead-letter queue configured"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: start-message-move-task
              method: POST
              description: "Start moving messages from a dead-letter queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-message-move-tasks
              method: POST
              description: "List message move tasks"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: cancel-message-move-task
              method: POST
              description: "Cancel a running message move task"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: permissions
          path: /
          description: "Queue permission operations"
          operations:
            - name: add-permission
              method: POST
              description: "Add a permission to a queue for a specific principal"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: remove-permission
              method: POST
              description: "Remove a permission from a queue"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: sqs-api
      resources:
        - path: /v1/queues
          name: queues
          description: "Queue management"
          operations:
            - method: GET
              name: list-queues
              description: "List all SQS queues"
              call: "amazon-sqs.list-queues"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-queue
              description: "Create a new queue"
              call: "amazon-sqs.create-queue"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sqs-mcp
      transport: http
      tools:
        - name: list-queues
          description: "List all SQS queues"
          hints:
            readOnly: true
          call: "amazon-sqs.list-queues"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-queue
          description: "Create a new SQS queue"
          hints:
            readOnly: false
          call: "amazon-sqs.create-queue"
          with:
            queue_name: "tools.queue_name"
          outputParameters:
            - type: object
              mapping: "$."
        - name: send-message
          description: "Send a message to an SQS queue"
          hints:
            readOnly: false
          call: "amazon-sqs.send-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: receive-message
          description: "Receive messages from an SQS queue"
          hints:
            readOnly: true
          call: "amazon-sqs.receive-message"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-queue-attributes
          description: "Get attributes for an SQS queue"
          hints:
            readOnly: true
          call: "amazon-sqs.get-queue-attributes"
          outputParameters:
            - type: object
              mapping: "$."
