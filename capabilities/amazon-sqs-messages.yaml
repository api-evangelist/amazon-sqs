naftiko: 1.0.0-alpha2
info:
  label: Amazon SQS Amazon Simple Queue Service (SQS) API — Messages
  description: 'Amazon SQS Amazon Simple Queue Service (SQS) API — Messages. 10 operations. Lead operation: Amazon Sqs Receive
    Messages From a Queue. Self-contained Naftiko capability covering one Amazon Sqs business surface.'
  tags:
  - Amazon Sqs
  - Messages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_SQS_API_KEY: AMAZON_SQS_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-sqs-messages
    baseUri: https://sqs.{region}.amazonaws.com
    description: Amazon SQS Amazon Simple Queue Service (SQS) API — Messages business capability. Self-contained, no shared
      references.
    resources:
    - name: accountId-queueName
      path: /{accountId}/{queueName}
      operations:
      - name: receivemessage
        method: GET
        description: Amazon Sqs Receive Messages From a Queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: MaxNumberOfMessages
          in: query
          type: integer
          description: The maximum number of messages to return. Amazon SQS never returns more messages than this value. Valid
            values are 1 to 10. Default is 1.
        - name: VisibilityTimeout
          in: query
          type: integer
          description: The duration (in seconds) that the received messages are hidden from subsequent retrieve requests after
            being retrieved by a ReceiveMessage request.
        - name: WaitTimeSeconds
          in: query
          type: integer
          description: The duration (in seconds) for which the call waits for a message to arrive in the queue before returning.
            If a message is available, the call returns sooner tha
        - name: AttributeName.1
          in: query
          type: string
          description: A list of attributes that need to be returned along with each message.
        - name: MessageAttributeName.1
          in: query
          type: string
          description: The name of the message attribute to include. Use All or .* to return all message attributes.
        - name: MessageSystemAttributeName.1
          in: query
          type: string
          description: The name of the message system attribute to include.
        - name: ReceiveRequestAttemptId
          in: query
          type: string
          description: Used for FIFO queues. The token used for deduplication of ReceiveMessage calls.
      - name: sendmessage
        method: POST
        description: Amazon Sqs Send a Message to a Queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: accountId-queueName-cancel-message-move-task
      path: /{accountId}/{queueName}/cancel-message-move-task
      operations:
      - name: cancelmessagemovetask
        method: POST
        description: Amazon Sqs Cancel a Message Move Task
        outputRawFormat: json
        outputParameters:
